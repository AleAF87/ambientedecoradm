<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ambiente Decor Adm</title>
    <link rel="icon" type="image/x-icon" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    
    <main class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">
                            <i class="fas fa-tasks me-2 text-primary"></i>
                            Ordens de Serviço - Kanban
                        </h4>
                        <button class="btn btn-primary" onclick="window.adicionarNovaOS()">
                            <i class="fas fa-plus me-1"></i>
                            Nova Ordem
                        </button>
                    </div>
                    <div class="card-body" id="dashboard-content">
                        <!-- O conteúdo Kanban será carregado aqui pelo dashboard.js -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
                            <h5>Carregando dashboard...</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para Nova OS -->
    <div class="modal fade" id="modalNovaOS" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-plus-circle me-2 text-primary"></i>
                        Nova Ordem de Serviço
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formNovaOS">
                        <div class="mb-3">
                            <label class="form-label">Título do Serviço *</label>
                            <input type="text" class="form-control" id="osTitulo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cliente *</label>
                            <input type="text" class="form-control" id="osCliente" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Equipamento/Móvel *</label>
                            <input type="text" class="form-control" id="osEquipamento" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prioridade *</label>
                                <select class="form-select" id="osPrioridade">
                                    <option value="baixa">Baixa</option>
                                    <option value="media" selected>Média</option>
                                    <option value="alta">Alta</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prazo *</label>
                                <input type="date" class="form-control" id="osPrazo" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" id="osDescricao" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="window.salvarNovaOS()">
                        <i class="fas fa-save me-1"></i>
                        Criar Ordem
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes da OS -->
    <div class="modal fade" id="modalDetalhesOS" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-file-alt me-2 text-primary"></i>
                        Detalhes da Ordem de Serviço
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detalhesOSContent">
                    <!-- Conteúdo carregado dinamicamente -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth-check.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
