<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ambiente Decor Adm</title>
    <link rel="icon" type="image/x-icon" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    <main class="container-fluid mt-4">
        <div class="card">
            <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h4 class="mb-0 dashboard-title"><i class="fas fa-table-columns me-2 text-primary"></i>Dashboard de Orçamentos</h4>
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <div class="btn-group" role="group" aria-label="Modo de visualização">
                        <button id="viewKanban" class="btn btn-primary btn-sm" type="button">
                            <i class="fas fa-table-columns me-1"></i>Kanban
                        </button>
                        <button id="viewCalendar" class="btn btn-outline-primary btn-sm" type="button">
                            <i class="fas fa-calendar-days me-1"></i>Calendário
                        </button>
                    </div>
                    <div class="d-flex align-items-center gap-2 dashboard-event-filter">
                        <input id="filtroDataEvento" type="date" class="form-control form-control-sm" title="Data do próximo evento">
                        <button id="btnVerEventosData" class="btn btn-outline-secondary btn-sm" type="button">
                            <i class="fas fa-list-check me-1"></i>Ver próximos do dia
                        </button>
                    </div>
                    <input id="dashboardBusca" class="form-control" style="max-width:320px" placeholder="Buscar cliente...">
                </div>
            </div>
            <div class="card-body" id="dashboard-content"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
